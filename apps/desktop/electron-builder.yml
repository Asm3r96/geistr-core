appId: app.geistr.core.desktop
productName: Geistr Core
executableName: Geistr Core
copyright: Copyright © 2026 Mohammed

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*
  - package.json

extraMetadata:
  main: dist/main/main.js

asar: true

mac:
  category: public.app-category.productivity
  icon: resources/icon-1024.png
  target:
    - dmg

win:
  icon: resources/icon.ico
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
  category: Utility
  desktopName: geistr-core

publish: null
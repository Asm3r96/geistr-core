version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      root-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies

  - package-ecosystem: "npm"
    directory: "/apps/desktop"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      desktop-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies

  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      core-dependencies:
        patterns:
          - "*"
    labels:
      - dependencies
